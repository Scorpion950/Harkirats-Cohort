<!DOCTYPE html>
<html lang = "en">

<head>
    <meta charset = "UTF-8">
    <meta name = "viewport" content = "width=device-width,initial-scale= 1.0">
    <title>Grid Layout</title>
    <style>
         .container{
            width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 2fr; /* 1fr is for left and 2fr is for right*/
            gap: 10px;
        }
        .left{
            background-color: red;
        }
        .right{
            background-color: blue;
        }
    </style>

    <body>
        <div class="container">
            <div class="left">
                <h1>This is left</h1>
                </div> 
            <div class="right">
                <h1>This is right</h1>
            </div>
            </div>
    </body>
